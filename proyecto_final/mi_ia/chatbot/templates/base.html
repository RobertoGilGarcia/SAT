{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mi IA{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'styles.css' %}">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'home' %}">Mi IA</a>

            <div class="ms-auto d-flex align-items-center gap-2">
                {% if request.user.is_authenticated %}
                    <span class="text-white">Hola, {{ request.user.username }}</span>

                    <a class="btn btn-outline-light btn-sm" href="{% url 'cuenta' %}">
                        Mi cuenta
                    </a>

                    <a class="btn btn-warning btn-sm" href="{% url 'home' %}">
                        Portada
                    </a>

                    <form method="post" action="{% url 'logout' %}" class="d-inline m-0">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger btn-sm">
                            Cerrar sesión
                        </button>
                    </form>
                {% else %}
                    <a class="btn btn-outline-light btn-sm" href="{% url 'login' %}">
                        Login
                    </a>

                    <a class="btn btn-warning btn-sm" href="{% url 'registro' %}">
                        Registro
                    </a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="container py-5">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
